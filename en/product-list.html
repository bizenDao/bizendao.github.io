<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>BizenDAO｜Product List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/style2.css" />
</head>

<body>
    <!-- Header：TOPと同じ想定 -->
    <header class="site-header product-header">
        <div class="container header-inner">
            <a href="index.html" class="logo"><img src="../img/349F5603-389E-48C6-81C9-1515A338A59B.png" alt="Logo"> </a>

            <!-- 検索 -->
            <div class="plist-search-wrap">
                <span class="plist-search-icon">🔍</span>
                <input id="keywordInput" type="search" class="plist-search-input" placeholder="Search by keyword (artist name, title, etc.)" />
            </div>

            <div class="header-right">
                <span class="lang-switch"><a class="lang-btn" data-lang="en" href="#">EN</a> / <a class="lang-btn" data-lang="ja" href="#">JP</a> / <a class="lang-btn" data-lang="fr" href="#">FR</a></span>
                <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
                    <span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Drawer（右から） -->
    <div class="nav-overlay" hidden></div>
    <aside class="nav-drawer" aria-label="Site menu" aria-hidden="true">
        <ul class="drawer-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="/product-list.html">Products</a></li>
            <li><a href="/artist-list.html">Artists</a></li>
            <li><a href="/index.html#company">About Us</a></li>
            <li><a href="/index.html#discord">Discord</a></li>
            <li><a href="/meta.html">Meta</a></li>
            <li><a href="/index.html#donation">Donation</a></li>
        </ul>
    </aside>

    <main class="plist-main">
        <div class="plist-page-inner">

            <section class="plist-hero">
                <h1 class="plist-title">Products</h1>
            </section>

            <!-- フィルター -->
            <section class="plist-filters" aria-label="Product filters">
                <div class="plist-filter-row">
                    <button class="filter-chip filter-chip--artist is-active" data-artist="all">ALL</button>
                    <button class="filter-chip filter-chip--artist" data-artist="mori-toshiaki">Toshiaki Mori</button>
                    <button class="filter-chip filter-chip--artist" data-artist="fujita-syo">Syo Fujita</button>
                    <button class="filter-chip filter-chip--artist" data-artist="mori-taiga">Taiga Mori</button>
                </div>

                <div class="plist-filter-row">
                    <button class="filter-chip filter-chip--kiln is-active" data-kiln="all">ALL Kiln</button>
                    <button class="filter-chip filter-chip--kiln" data-kiln="hozan">Hozangama</button>
                </div>

                <div class="plist-filter-row plist-filter-row--select">
                    <label for="categorySelect" class="plist-select-label">Category</label>
                    <div class="plist-select-wrap">
                        <select id="categorySelect" class="plist-select">
                            <option value="all">All</option>
                            <option value="flower-vase">Flower Vase</option>
                            <option value="tea-bowl">Tea Bowl / Yunomi</option>
                            <option value="cup">Cup</option>
                            <option value="plate">Plate</option>
                            <option value="object">Object / Other</option>
                        </select>
                        <span class="plist-select-arrow">▼</span>
                    </div>
                </div>
            </section>

            <!-- 商品グリッド（JSON→生成） -->
            <section class="plist-products" aria-label="Product list">
                <div id="productGrid" class="product-list-grid"></div>
                <p class="plist-empty" hidden>No products match your criteria.</p>
            </section>

        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <nav class="footer-nav">
                <ul>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/product-list.html">Products</a></li>
                    <li><a href="/artist-list.html">Artists</a></li>
                    <li><a href="./index.html#company">About Us</a></li>
                    <li><a href=".index.html#discord">Discord</a></li>
                    <li><a href="./meta.html">Meta</a></li>
                    <li><a href=".index.html#donation">Donation</a></li>
                </ul>
            </nav>
            <div class="footer-logo"><a href="#top" class="logo"><img src="../img/349F5603-389E-48C6-81C9-1515A338A59B.png" alt="Logo"> </a></div>
        </div>
    </footer>

    <script src="../js/app2.js"></script>
<script src="../js/lang-toggle.js"></script>
</body>

</html>
