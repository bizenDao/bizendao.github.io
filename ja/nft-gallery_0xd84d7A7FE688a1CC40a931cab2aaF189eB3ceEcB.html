<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <title>NFT ギャラリー — BizenDAO</title>
    <link rel="stylesheet" href="../css/style4.css">
    <style>
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            padding: 2rem 0;
        }
        .nft-card {
            background: #fff;
            border: 1px solid #E2D4BE;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            transition: transform .2s, box-shadow .2s;
        }
        .nft-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,.12); }
        .nft-card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #F5F0E8; }
        .nft-card-body { padding: 1rem; }
        .nft-card-id { font-size: .75rem; color: #78716C; margin-bottom: .3rem; }
        .nft-card-name { font-weight: 700; font-size: .95rem; color: #92400E; line-height: 1.4; }
        .nft-card-name-sub { font-size: .82rem; color: #78716C; margin-top: .2rem; }
        .nft-opensea {
            display: inline-block; margin-top: .8rem; padding: .35rem .9rem;
            background: #92400E; color: #fff; border-radius: 999px;
            font-size: .78rem; text-decoration: none; font-weight: 600;
        }
        .nft-opensea:hover { background: #B45309; }
        .nft-contract { font-size: .78rem; color: #78716C; text-align: center; margin-top: 1rem; word-break: break-all; }
    </style>
</head>

                <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
                    <span></span><span></span>

    const grid = document.getElementById('gallery');
    nfts.forEach(n => {
      const card = document.createElement('div');
      card.className = 'nft-card';
      card.innerHTML = `
        <img src="${n.image}" alt="${n.name}" loading="lazy">
        <div class="nft-card-body">
          <div class="nft-card-id">Token #${n.id}</div>
          <div class="nft-card-name">${n.name}</div>
          <div class="nft-card-name-sub">${n.nameJa}</div>

      grid.appendChild(card);

    </script>
